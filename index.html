<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel=stylesheet  href={{url_for('static',filename = 'style.css')}}>
</head>

<body>

<div class="container">

    <h1>Marks Prediction</h1>

    <form action="/predict" method="post">
        <input
            type="text"
            name="hourscount"
            placeholder="Enter Number Of Hours Studied"
            required
        >
        <button type="submit">Click to See Marks</button>
    </form>

    <div class="result">
        Predicted Marks: <strong>{{ value }}</strong>
    </div>

</div>

</body>
</html>
